<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Ukrainian Transliterator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght=0,300;0,400;0,500;1,400&display=swap');

:root {
  --bg-main: #07070a;
  --bg-surface: #0f0f1a;
  --bg-control: #161626;
  --border-color: #2a2a3d;
  --border-subtle: #222233;
  --text-primary: #ffffff;
  --text-muted: #a0a0b0;
  --text-hint: #808095;
  --accent-blue: #5fa8ff;
  --accent-yellow: #ffe082;
  --headline-color: #555566;
}

[data-theme="light"] {
  --bg-main: #f0f2f5;
  --bg-surface: #ffffff;
  --bg-control: #e4e7ec;
  --border-color: #a0a5b5;
  --border-subtle: #cbd0dd;
  --text-primary: #000000;
  --text-muted: #4a4a5a;
  --text-hint: #555566;
  --accent-blue: #0052cc;
  --accent-yellow: #997000;
  --headline-color: #666677;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-main);color:var(--text-primary);font-family:'DM Mono',monospace;transition: background 0.12s, color 0.12s;overflow-x:hidden}
.wrap{min-height:100vh;background:var(--bg-main)}

/* Header */
.hdr{border-bottom:1px solid var(--border-color);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:var(--bg-surface)}
.hdr-controls{display:flex;align-items:center;gap:12px}
.logo{font-size:13px;letter-spacing:.25em;text-transform:uppercase;color:var(--accent-blue);font-weight:500;user-select:none}
.logo span{color:var(--accent-yellow);margin-right:5px}

.mode-toggle, .theme-toggle-wrap{display:flex;align-items:center;background:var(--bg-control);border:1px solid var(--border-color);border-radius:6px;padding:4px}
.mode-btn, .theme-btn{padding:6px 16px;border-radius:4px;border:none;cursor:pointer;font-size:12px;letter-spacing:.06em;font-family:'DM Mono',monospace;transition:all .12s;background:transparent;color:var(--text-muted);font-weight:500}
.mode-btn.active, .theme-btn.active{background:var(--accent-blue);color:var(--bg-main);font-weight:600}
.mode-btn:hover:not(.active), .theme-btn:hover:not(.active){color:var(--text-primary);background:rgba(255,255,255,0.06)}

/* Desktop Workspace Split */
.main{max-width:1440px;margin:0 auto;padding:32px 24px;display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:start}

/* Linke Spalte: Editor */
.editor-section{display:flex;flex-direction:column}
.headline{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--headline-color);margin-bottom:16px;font-weight:500}
.hint{background:var(--bg-surface);border:1px solid var(--border-color);border-radius:6px;padding:12px 16px;margin-bottom:18px;font-size:12px;color:var(--text-muted);line-height:1.6}
.hint kbd{display:inline-block;background:var(--bg-control);border:1px solid var(--border-color);border-radius:4px;padding:1px 6px;color:var(--accent-yellow);font-size:11px;font-family:'DM Mono',monospace;margin:0 2px;font-weight:500}
.lbl{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-blue);margin-bottom:8px;display:block;font-weight:500}

textarea{width:100%;height:420px;background:var(--bg-surface);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:21px;font-family:'DM Mono',monospace;line-height:1.6;padding:20px;resize:vertical;outline:none;transition:border-color .15s;caret-color:var(--accent-yellow)}
textarea:focus{border-color:var(--accent-blue);box-shadow: 0 0 0 1px var(--accent-blue)}
.ccount{font-size:12px;color:var(--text-muted);text-align:right;margin-top:6px;font-family:'DM Mono',monospace}

.action-row{display:flex;gap:10px;margin:16px 0 0}
.btn{padding:10px 20px;border-radius:6px;cursor:pointer;font-size:12px;letter-spacing:.06em;font-family:'DM Mono',monospace;transition:all .12s;text-align:center;font-weight:500}
.btn-blue{background:rgba(95,168,255,.12);border:1px solid var(--accent-blue);color:var(--accent-blue)}
.btn-blue:hover{background:var(--accent-blue);color:var(--bg-main);font-weight:600}
.btn-yellow{background:rgba(255,224,130,.1);border:1px solid var(--accent-yellow);color:var(--accent-yellow)}
.btn-yellow:hover{background:var(--accent-yellow);color:var(--bg-main);font-weight:600}
.btn-ghost{background:var(--bg-control);border:1px solid var(--border-color);color:var(--text-primary)}
.btn-ghost:hover{background:var(--border-color);border-color:var(--text-muted)}

/* Rechte Spalte: Feste Zeichentabelle */
.table-wrap{background:var(--bg-surface);border:1px solid var(--border-color);border-radius:8px;padding:20px}
.table-lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-blue);margin-bottom:16px;display:block;border-bottom:1px solid var(--border-subtle);padding-bottom:8px;font-weight:500}
.char-grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:8px}
.char-cell{background:var(--bg-control);border:1px solid var(--border-color);border-radius:4px;padding:10px 4px;text-align:center;cursor:pointer;transition:all .1s;user-select:none}
.char-cell:hover{border-color:var(--accent-blue);background:var(--border-color);transform:scale(1.04)}
.cell-lat{font-size:11px;color:var(--text-muted);display:block;margin-bottom:2px;letter-spacing:.03em}
.cell-cyr{font-size:18px;color:var(--text-primary);display:block;font-weight:500}

/* Toast Notification */
.toast{position:fixed;bottom:32px;left:32px;background:var(--accent-blue);color:var(--bg-main);padding:10px 22px;border-radius:6px;font-size:12px;font-family:'DM Mono',monospace;font-weight:700;letter-spacing:.1em;pointer-events:none;z-index:999;opacity:0;transition:opacity .15s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="wrap">
<header class="hdr">
  <div class="logo"><span>UA</span>translit</div>
  <div class="hdr-controls">
    <div class="theme-toggle-wrap">
      <button class="theme-btn active" id="theme-dark" onclick="setTheme('dark')">dark</button>
      <button class="theme-btn" id="theme-light" onclick="setTheme('light')">light</button>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-lat2cyr" onclick="setMode('lat2cyr')">lat вҶ’ СғРәСҖ</button>
      <button class="mode-btn" id="btn-cyr2lat" onclick="setMode('cyr2lat')">СғРәСҖ вҶ’ lat</button>
    </div>
  </div>
</header>

<main class="main">
  <!-- Linke Seite: Editor -->
  <section class="editor-section">
    <div class="headline">Ukrainian transliterator В· ua-translit</div>

    <div class="hint">
      <kbd>Esc</kbd> toggle mode &nbsp;В·&nbsp;
      <kbd>s</kbd>вҶ’СҒ &nbsp;<kbd>sh</kbd>вҶ’СҲ &nbsp;<kbd>shh</kbd>вҶ’Сү &nbsp;
      <kbd>g'</kbd>вҶ’Т‘ &nbsp;<kbd>i'</kbd>вҶ’С— &nbsp;<kbd>zh</kbd>вҶ’Р¶ &nbsp;
      <kbd>ch</kbd>вҶ’СҮ &nbsp;<kbd>+</kbd> separates digraphs &nbsp;В·&nbsp;
      <kbd>Ctrl+Z</kbd> undo
    </div>

    <span class="lbl" id="editor-lbl">type latin вҖ” get ukrainian</span>
    <textarea id="ta" placeholder="Pryvit, svite..." spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    <div class="ccount"><span id="ccount">0</span> chars</div>

    <div class="action-row">
      <button class="btn btn-blue" onclick="convertAll('cyr2lat')">вҶ’ to latin</button>
      <button class="btn btn-blue" onclick="convertAll('lat2cyr')">вҶ’ to ukrainian</button>
      <button class="btn btn-yellow" onclick="copyText()">copy to clipboard</button>
      <button class="btn btn-ghost" onclick="clearText()">clear</button>
    </div>
  </section>

  <!-- Rechte Seite: Zeichentabelle -->
  <aside class="table-wrap">
    <span class="table-lbl">character map</span>
    <div class="char-grid" id="char-grid"></div>
  </aside>
</main>
</div>

<div class="toast" id="toast">copied to clipboard вң“</div>

<script>
const tra={},abc2={},abc1={};
tra['a']=['Р№+','Рё+','Рҷ+','Рҳ+','Р№','Рё','Рҷ','Рҳ','',''];
abc2['a']=['Р№Р°','РёР°','РҷР°','РҳР°','СҸ','СҸ','РҜ','РҜ','Р°','a'];
tra['b']=['',''];abc2['b']=['Рұ','b'];
tra['v']=['',''];abc2['v']=['РІ','v'];
tra['g']=['',''];abc2['g']=['Рі','g'];
tra["'"]=['Рі+','С–+','Р“+','РҶ+','СҢ+','Рі','С–','Р“','РҶ','СҢ','',''];
abc2["'"]=['РіСҢ','С–СҢ','Р“СҢ','РҶСҢ','СҢСҢ','Т‘','С—','Тҗ','РҮ','Р¬','СҢ',"'"];
tra['d']=['',''];abc2['d']=['Рҙ','d'];
tra['e']=['Р№+','Рё+','Рҷ+','Рҳ+','Р№','Рё','Рҷ','Рҳ','',''];
abc2['e']=['Р№Рө','РёРө','РҷРө','РҳРө','С”','С”','Р„','Р„','Рө','e'];
tra['Г¶']=['',''];abc2['Г¶']=['С”','Г¶'];
tra['h']=['СҒС…+','РЎС…+','СҒС…','РЎС…','Р·+','СҶ+','СҒ+','СҲ+','Р—+','РҰ+','РЎ+','РЁ+','Р·','СҶ','СҒ','СҲ','Р—','РҰ','РЎ','РЁ','',''];
abc2['h']=['СҒС…С…','РЎС…С…','Сү','Р©','Р·С…','СҶС…','СҒС…','СҲС…','Р—С…','РҰС…','РЎС…','РЁС…','Р¶','СҮ','СҲ','Сү','Р–','Р§','РЁ','Р©','С…','h'];
tra['z']=['',''];abc2['z']=['Р·','z'];
tra['y']=['',''];abc2['y']=['Рё','y'];
tra['i']=['Р№+','Рҷ+','Р№','Рҷ','',''];abc2['i']=['Р№С–','РҷС–','С—','РҮ','С–','i'];
tra['j']=['',''];abc2['j']=['Р№','j'];
tra['k']=['',''];abc2['k']=['Рә','k'];
tra['l']=['',''];abc2['l']=['Р»','l'];
tra['m']=['',''];abc2['m']=['Рј','m'];
tra['n']=['',''];abc2['n']=['РҪ','n'];
tra['o']=['',''];abc2['o']=['Рҫ','o'];
tra['p']=['',''];abc2['p']=['Рҝ','p'];
tra['r']=['',''];abc2['r']=['СҖ','r'];
tra['s']=['',''];abc2['s']=['СҒ','s'];
tra['t']=['',''];abc2['t']=['СӮ','t'];
tra['u']=['Р№+','Рё+','Рҷ+','Рҳ+','Р№','Рё','Рҷ','Рҳ','',''];
abc2['u']=['Р№Сғ','РёСғ','РҷСғ','РҳСғ','СҺ','СҺ','Р®','Р®','Сғ','u'];
tra['f']=['',''];abc2['f']=['С„','f'];
tra['x']=['',''];abc2['x']=['С…','x'];
tra['c']=['',''];abc2['c']=['СҶ','c'];
tra['w']=['',''];abc2['w']=['СҲ','w'];
tra['q']=['',''];abc2['q']=['Сү','q'];
tra['Гј']=['',''];abc2['Гј']=['СҺ','Гј'];
tra['A']=['Рҷ+','Рҳ+','Рҷ','Рҳ','',''];abc2['A']=['РҷРҗ','РҳРҗ','РҜ','РҜ','Рҗ','A'];
tra['B']=['',''];abc2['B']=['Р‘','B'];tra['V']=['',''];abc2['V']=['Р’','V'];
tra['G']=['',''];abc2['G']=['Р“','G'];tra['D']=['',''];abc2['D']=['Р”','D'];
tra['E']=['Рҷ+','Рҳ+','Рҷ','Рҳ','',''];abc2['E']=['РҷР•','РҳР•','Р„','Р„','Р•','E'];
tra['Г–']=['',''];abc2['Г–']=['Р„','Г–'];
tra['H']=['РЎРҘ+','РЎРҘ','Р—+','РҰ+','РЎ+','РЁ+','Р—','РҰ','РЎ','РЁ','',''];
abc2['H']=['РЎРҘРҘ','Р©','Р—РҘ','РҰРҘ','РЎРҘ','РЁРҘ','Р–','Р§','РЁ','Р©','РҘ','H'];
tra['Z']=['',''];abc2['Z']=['Р—','Z'];tra['Y']=['',''];abc2['Y']=['Рҳ','Y'];
tra['I']=['Рҷ+','Рҷ','',''];abc2['I']=['РҷРҶ','РҮ','РҶ','I'];
tra['J']=['',''];abc2['J']=['Рҷ','J'];tra['K']=['',''];abc2['K']=['Рҡ','K'];
tra['L']=['',''];abc2['L']=['Рӣ','L'];tra['M']=['',''];abc2['M']=['Рң','M'];
tra['N']=['',''];abc2['N']=['Рқ','N'];tra['O']=['',''];abc2['O']=['Рһ','O'];
tra['P']=['',''];abc2['P']=['Рҹ','P'];tra['R']=['',''];abc2['R']=['Р ','R'];
tra['S']=['',''];abc2['S']=['РЎ','S'];tra['T']=['',''];abc2['T']=['Рў','T'];
tra['U']=['Рҷ+','Рҳ+','Рҷ','Рҳ','',''];abc2['U']=['РҷРЈ','РҳРЈ','Р®','Р®','РЈ','U'];
tra['F']=['',''];abc2['F']=['РӨ','F'];tra['X']=['',''];abc2['X']=['РҘ','X'];
tra['C']=['',''];abc2['C']=['РҰ','C'];tra['W']=['',''];abc2['W']=['РЁ','W'];
tra['Q']=['',''];abc2['Q']=['Р©','Q'];tra['Гң']=['',''];abc2['Гң']=['Р®','Гң'];

'Р° Рұ РІ Рі Т‘ Рҙ Рө С” Р¶ Р· Рё С– С— Р№ Рә Р» Рј РҪ Рҫ Рҝ СҖ СҒ СӮ Сғ С„ С… СҶ СҮ СҲ Сү СҢ СҺ СҸ Рҗ Р‘ Р’ Р“ Тҗ Р” Р• Р„ Р– Р— Рҳ РҶ РҮ Рҷ Рҡ Рӣ M H O Рҹ Р  РЎ Рў РЈ РӨ РҘ РҰ Р§ РЁ Р© Р¬ Р® РҜ'.split(' ').forEach(c=>{
  const m={'Р°':'a','Рұ':'b','РІ':'v','Рі':'g','Т‘':"g'",'Рҙ':'d','Рө':'e','С”':'je','Р¶':'zh','Р·':'z','Рё':'y','С–':'i','С—':"i'",'Р№':'j','Рә':'k','Р»':'l','Рј':'m','РҪ':'n','Рҫ':'o','Рҝ':'p','СҖ':'r','СҒ':'s','СӮ':'t','Сғ':'u','С„':'f','С…':'h','СҶ':'c','СҮ':'ch','СҲ':'sh','Сү':'shh','СҢ':"'",'СҺ':'ju','СҸ':'ja','Рҗ':'A','Р‘':'B','Р’':'V','Р“':'G','Тҗ':"G'",'Р”':'D','Р•':'E','Р„':'Je','Р–':'Zh','Р—':'Z','Рҳ':'Y','РҶ':'I','РҮ':"I'",'Рҷ':'J','Рҡ':'K','Рӣ':'L','Рң':'M','Рқ':'N','Рһ':'O','Рҹ':'P','Р ':'R','РЎ':'S','Рў':'T','РЈ':'U','РӨ':'F','РҘ':'H','РҰ':'C','Р§':'Ch','РЁ':'Sh','Р©':'Shh','Р¬':"''",'Р®':'Ju','РҜ':'Ja'};
  if(m[c]) abc1[c]=m[c];
});

function transSym2(txt){
  const pre=txt.slice(0,-1),last=txt.slice(-1);
  const lat=tra[last],rus=abc2[last];
  if(lat){for(let i=0;i<lat.length;i++){const pos=pre.length>lat[i].length?pre.length-lat[i].length:0;if(lat[i]===pre.slice(pos))return pre.slice(0,pre.length-lat[i].length)+rus[i];}}
  return txt;
}
function transStr2(s){let o='';for(let i=0;i<s.length;i++)o=transSym2(o+s[i]);return o;}
function transSym1(s){return abc1[s]!==undefined?abc1[s]:s;}
function transStr1(s){let o='';for(let i=0;i<s.length;i++)o+=transSym1(s[i]);return o;}

const CHARS=[
  ['a','Р°'],['b','Рұ'],['v','РІ'],['g','Рі'],["g'",'Т‘'],['d','Рҙ'],
  ['e','Рө'],['je/Г¶','С”'],['zh','Р¶'],['z','Р·'],['y','Рё'],['i','С–'],
  ["i'/ji",'С—'],['j','Р№'],['k','Рә'],['l','Р»'],['m','Рј'],['n','РҪ'],
  ['o','Рҫ'],['p','Рҝ'],['r','СҖ'],['s','СҒ'],['t','СӮ'],['u','Сғ'],
  ['f','С„'],['h/x','С…'],['c','СҶ'],['ch','СҮ'],['sh/w','СҲ'],['shh/q','Сү'],
  ["'",'СҢ'],['ju/Гј','СҺ'],['ja','СҸ']
];

const grid=document.getElementById('char-grid');
CHARS.forEach(([lat,cyr])=>{
  const cell=document.createElement('div');
  cell.className='char-cell';
  cell.innerHTML=`<span class="cell-lat">${lat}</span><span class="cell-cyr">${cyr}</span>`;
  cell.onclick=()=>insertChar(cyr);
  grid.appendChild(cell);
});

let mode='lat2cyr';
const undoStack=[];
const ta=document.getElementById('ta');

function setMode(m){
  mode=m;
  document.getElementById('btn-lat2cyr').className='mode-btn'+(m==='lat2cyr'?' active':'');
  document.getElementById('btn-cyr2lat').className='mode-btn'+(m==='cyr2lat'?' active':'');
  document.getElementById('editor-lbl').textContent=m==='lat2cyr'?'type latin вҖ” get ukrainian':'type ukrainian вҖ” get latin';
  ta.placeholder=m==='lat2cyr'?'Pryvit, svite...':'РҹСҖРёРІС–СӮ, СҒРІС–СӮРө...';
  ta.focus();
}

function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-dark').className='theme-btn'+(t==='dark'?' active':'');
  document.getElementById('theme-light').className='theme-btn'+(t==='light'?' active':'');
  try { localStorage.setItem('ua-translit-theme', t); } catch(e) {}
}

const savedTheme = localStorage.getItem('ua-translit-theme');
if(savedTheme === 'light' || savedTheme === 'dark') {
  setTheme(savedTheme);
} else {
  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  setTheme(prefersLight ? 'light' : 'dark');
}

function saveUndo(v){
  const last=undoStack.length?undoStack[undoStack.length-1]:'';
  if(last!==v){undoStack.push(v);if(undoStack.length>20)undoStack.shift();}
}

function updateCount(){document.getElementById('ccount').textContent=ta.value.length;}

ta.addEventListener('keydown',e=>{
  if(e.key==='Escape'||e.key==='F12'){e.preventDefault();setMode(mode==='lat2cyr'?'cyr2lat':'lat2cyr');return;}
  if(e.ctrlKey&&e.key==='z'){
    e.preventDefault();
    if(undoStack.length>1){undoStack.pop();const p=undoStack[undoStack.length-1]??'';ta.value=p;updateCount();}
    return;
  }
});

ta.addEventListener('keypress',e=>{
  if(e.ctrlKey||e.altKey||e.metaKey)return;
  const code=e.which||e.charCode||e.keyCode;
  if(!code||code<=33)return;
  e.preventDefault();
  const p1=ta.selectionStart,p2=ta.selectionEnd;
  const before=ta.value.slice(0,p1),after=ta.value.slice(p2);
  const ch=String.fromCharCode(code);
  let result=mode==='cyr2lat'?before+transSym1(ch):transSym2(before+ch);
  const newVal=result+after;
  ta.value=newVal;
  updateCount();
  saveUndo(newVal);
  requestAnimationFrame(()=>ta.setSelectionRange(result.length,result.length));
});

ta.addEventListener('input',()=>{updateCount();saveUndo(ta.value);});

function convertAll(toMode){
  const p1=ta.selectionStart,p2=ta.selectionEnd,hasSel=p1!==p2;
  const src=hasSel?ta.value.slice(p1,p2):ta.value;
  const conv=toMode==='cyr2lat'?transStr1(src):transStr2(src);
  const nv=hasSel?ta.value.slice(0,p1)+conv+ta.value.slice(p2):conv;
  ta.value=nv;updateCount();saveUndo(nv);ta.focus();
}

function insertChar(cyr){
  const p1=ta.selectionStart??ta.value.length;
  const nv=ta.value.slice(0,p1)+cyr+ta.value.slice(ta.selectionEnd??p1);
  ta.value=nv;updateCount();saveUndo(nv);
  requestAnimationFrame(()=>{ta.setSelectionRange(p1+cyr.length,p1+cyr.length);ta.focus();});
}

async function copyText(){
  try{await navigator.clipboard.writeText(ta.value);}
  catch{ta.select();document.execCommand('copy');}
  const t=document.getElementById('toast');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700);
}

function clearText(){saveUndo(ta.value);ta.value='';updateCount();ta.focus();}

ta.focus();
</script>
</body>
</html>
